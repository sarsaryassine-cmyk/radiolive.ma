<svg xmlns="http://www.w3.org/2000/svg" viewBox="-512 -512 1024 1024">
  <!-- Cercle rouge marocain (couleur drapeau officiel) -->
  <circle cx="0" cy="0" r="500" fill="#C1272D"/>

  <!-- Pentagramme vert (étoile du drapeau du Maroc) — dessiné en ligne continue
       qui se croise pour former le khatam à 5 branches, comme sur le drapeau.
       Stroke épais (60) pour rester visible à 16×16 dans Google SERPs. -->
  <path d="M 0 -340 L 199.86 275.13 L -323.37 -105.05 L 323.37 -105.05 L -199.86 275.13 Z"
        fill="none"
        stroke="#006233"
        stroke-width="60"
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>
