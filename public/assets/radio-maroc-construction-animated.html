<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Radio Maroc — Étoile construction animée</title>
<style>
  html,body{margin:0;background:transparent;}
  .rm-mark{width:100%;height:100%;display:block;}
</style>
</head>
<body>

<!-- ──────────────────────────────────────────────────────────────────
     │  RADIO MAROC — Étoile « construction » animée                    │
     │  Étoile contour rouge (pentagramme starD(200,78)) +              │
     │  pentagramme vert intérieur (pentagramD(200)).                   │
     │  Identique à la maquette Grid · Ø 1024 · pentagram radius 200u.  │
     ────────────────────────────────────────────────────────────────── -->

<style id="rm-mark-styles">
  .rm-mark .pulse{transform-origin:0 0;animation:rmPulse 4s cubic-bezier(0.2,0,0,1) infinite;}
  .rm-mark .pulse-1{animation-delay:0s;}
  .rm-mark .pulse-2{animation-delay:1.2s;}
  .rm-mark .pulse-3{animation-delay:2.4s;}
  .rm-mark .compassR{animation:rmSpin 60s linear infinite;transform-origin:0 0;}
  .rm-mark .starGlow{animation:rmStarGlow 3s ease-in-out infinite;transform-origin:0 0;}
  @keyframes rmPulse{0%{transform:scale(0.92);opacity:0;}40%{opacity:1;}100%{transform:scale(1.4);opacity:0;}}
  @keyframes rmSpin{to{transform:rotate(360deg);}}
  @keyframes rmStarGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(255,42,60,0.55));}50%{filter:drop-shadow(0 0 16px rgba(255,42,60,0.95));}}
</style>

<svg class="rm-mark" viewBox="-512 -512 1024 1024" xmlns="http://www.w3.org/2000/svg" aria-label="Radio Maroc">
  <defs>
    <radialGradient id="rmAura" cx="0" cy="-40" r="0.7" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2A3C" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#E60E1F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rmRingG" x1="0" y1="-1" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2EE39F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#006233" stop-opacity="0.6"/>
    </linearGradient>
    <path id="rmTextC" d="M -380 0 A 380 380 0 1 1 380 0 A 380 380 0 1 1 -380 0"/>
  </defs>

  <!-- aura rouge -->
  <circle cx="0" cy="0" r="500" fill="url(#rmAura)"/>

  <!-- compas (rotation) -->
  <g class="compassR" stroke="rgba(244,239,227,0.18)" fill="none">
    <circle r="430" stroke-width="0.8"/>
    <circle r="400" stroke-width="0.4" stroke-dasharray="2 6"/>
  </g>

  <!-- ticks compas -->
  <g id="rmTicks" stroke="rgba(244,239,227,0.35)" stroke-linecap="round"></g>

  <!-- anneaux pulsants -->
  <g fill="none" stroke="url(#rmRingG)" stroke-linecap="round">
    <circle class="pulse pulse-1" r="320" stroke-width="2.5" stroke-dasharray="4 8" opacity="0.85"/>
    <circle class="pulse pulse-2" r="265" stroke-width="3" opacity="0.65"/>
    <circle class="pulse pulse-3" r="215" stroke-width="3" opacity="0.45"/>
  </g>

  <!-- arcs verts -->
  <g fill="none" stroke="#2EE39F" stroke-linecap="round" opacity="0.85">
    <path d="M -260 -120 A 286 286 0 0 1 -120 -260" stroke-width="6"/>
    <path d="M 260 120 A 286 286 0 0 1 120 260" stroke-width="6"/>
  </g>

  <!-- — ÉTOILE CONSTRUCTION (identique à la maquette grid 200u) -->
  <g class="starGlow">
    <!-- pentagramme vert intérieur (pentagramD 200u) -->
    <path id="rmPentaGreen" fill="none" stroke="#2EE39F" stroke-width="6"
          stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
    <!-- contour étoile rouge (starD 200, 78) -->
    <path id="rmStarRed" fill="none" stroke="#E60E1F" stroke-width="6"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- centre -->
  <circle r="5" fill="#F4EFE3"/>

  <!-- point bas -->
  <circle cx="0" cy="360" r="4" fill="#F4EFE3" opacity="0.5"/>

  <!-- texte courbe -->
  <text font-family="Inter, system-ui, sans-serif" font-size="22" letter-spacing="14" fill="rgba(244,239,227,0.45)">
    <textPath href="#rmTextC" startOffset="0">RADIO  MAROC  ·  BROADCASTING  ·  ON  AIR  ·  ESTD  ٢٠٢٦  ·  </textPath>
  </text>
</svg>

<script>
(function(){
  // EXACT geometry from Radio Maroc Logo Premium.html construction view
  function starD(rO,rI){
    let d='';
    for(let i=0;i<10;i++){
      const a=-Math.PI/2+i*Math.PI/5;
      const r=i%2===0?rO:rI;
      d+=(i?'L':'M')+' '+(r*Math.cos(a)).toFixed(2)+' '+(r*Math.sin(a)).toFixed(2)+' ';
    }
    return d+'Z';
  }
  function pentagramD(r){
    const pts=[];
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+i*2*Math.PI/5;
      pts.push([r*Math.cos(a),r*Math.sin(a)]);
    }
    const order=[0,2,4,1,3];
    let d='M '+pts[order[0]][0].toFixed(2)+' '+pts[order[0]][1].toFixed(2);
    for(let i=1;i<5;i++) d+=' L '+pts[order[i]][0].toFixed(2)+' '+pts[order[i]][1].toFixed(2);
    return d+' Z';
  }

  document.getElementById('rmStarRed').setAttribute('d', starD(200, 78));
  document.getElementById('rmPentaGreen').setAttribute('d', pentagramD(200));

  // ticks
  const tg=document.getElementById('rmTicks');
  for(let i=0;i<32;i++){
    const a=i*2*Math.PI/32-Math.PI/2;
    const M=i%4===0;
    const inn=M?410:418,out=425;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',(inn*Math.cos(a)).toFixed(2));
    ln.setAttribute('y1',(inn*Math.sin(a)).toFixed(2));
    ln.setAttribute('x2',(out*Math.cos(a)).toFixed(2));
    ln.setAttribute('y2',(out*Math.sin(a)).toFixed(2));
    ln.setAttribute('stroke-width',M?2.5:1.2);
    ln.setAttribute('opacity',M?0.85:0.45);
    tg.appendChild(ln);
  }
})();
</script>

</body>
</html>
