<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f3f5"/>
    </linearGradient>
  </defs>

  <!-- Light background, rounded corners -->
  <rect width="256" height="256" rx="36" fill="url(#bg)"/>

  <!-- Wordmark "Atbir" -->
  <g transform="translate(34,140)" style="font-family: 'Arial Rounded MT Bold', 'Arial Black', sans-serif;">
    <!-- "A" oversized in vivid red -->
    <text x="0" y="0" font-size="100" font-weight="900" fill="#d62b4a"
          font-style="italic" letter-spacing="-4">A</text>

    <!-- "tbir" in dark grey-red, slightly italic -->
    <text x="62" y="0" font-size="78" font-weight="900" fill="#3a2730"
          font-style="italic" letter-spacing="-2">tbir</text>
  </g>

  <!-- "Radio" tag, small, top-right with arc accent -->
  <g transform="translate(160,68)">
    <!-- Small arc above the word -->
    <path d="M 4 6 Q 28 -4, 50 6"
          stroke="#d62b4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="22" font-size="20" font-weight="700"
          font-family="'Arial', sans-serif" font-style="italic" fill="#d62b4a"
          letter-spacing="0.5">Radio</text>
  </g>

  <!-- Tifinagh letters spelling Atbir (ⴰⵜⴱⵉⵔ) below the wordmark -->
  <g transform="translate(86,196)" fill="#d62b4a"
     style="font-family: 'Noto Sans Tifinagh', 'Tifinagh', sans-serif;">
    <text x="0" y="0" font-size="34" font-weight="600" letter-spacing="6">ⴰⵜⴱⵉⵔ</text>
  </g>
</svg>
