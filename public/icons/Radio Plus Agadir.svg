<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7228d8"/>
      <stop offset="100%" stop-color="#5a17b8"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="55%">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>
  <rect width="256" height="256" rx="40" fill="url(#shine)"/>

  <!-- Italic word group, slightly skewed for dynamic feel -->
  <g transform="translate(0,0)" style="font-family: 'Arial', 'Helvetica', sans-serif; font-style: italic;">
    <!-- "+" mark, top-right -->
    <g transform="translate(176,72)" fill="#fff">
      <rect x="-14" y="-3" width="28" height="6" rx="1.5"/>
      <rect x="-3" y="-14" width="6" height="28" rx="1.5"/>
    </g>

    <!-- "radio" -->
    <text x="128" y="148"
          text-anchor="middle"
          fill="#ffffff"
          font-size="70" font-weight="900"
          letter-spacing="-3"
          transform="skewX(-8)">radio</text>

    <!-- "AGADIRPlus" baseline -->
    <text x="128" y="200"
          text-anchor="middle"
          fill="#ffffff"
          font-size="36" font-weight="700"
          letter-spacing="0"
          transform="skewX(-8)">AGADIR<tspan font-weight="500" letter-spacing="-1">Plus</tspan></text>
  </g>
</svg>
