<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060c"/>
      <stop offset="100%" stop-color="#1a0f3d"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="85%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="65%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.045)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect width="1200" height="630" fill="url(#glowC)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo / icon glyph -->
  <g transform="translate(80,210)">
    <rect width="120" height="120" rx="28" fill="url(#title)"/>
    <g transform="translate(60,60)" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M -32 0 a32 32 0 0 1 64 0"/>
      <path d="M -22 0 a22 22 0 0 1 44 0"/>
      <circle cx="0" cy="0" r="5" fill="#fff"/>
    </g>
  </g>

  <!-- Title -->
  <text x="80" y="195" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="38" font-weight="600" fill="#a78bfa" letter-spacing="2">
    RADIO MAROC
  </text>

  <text x="240" y="270" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="76" font-weight="700" fill="#ffffff">
    Toutes les radios
  </text>

  <text x="240" y="350" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="76" font-weight="700" fill="url(#title)">
    marocaines en direct
  </text>

  <!-- Subtitle -->
  <text x="240" y="410" font-family="'Inter', system-ui, sans-serif"
        font-size="28" font-weight="400" fill="rgba(255,255,255,0.65)">
    Hit Radio · Radio Mars · Chada FM · Medi 1 · Radio 2M · 30+ stations
  </text>

  <!-- CTA pill -->
  <g transform="translate(240,460)">
    <rect width="245" height="56" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <text x="32" y="36" font-family="'Inter', system-ui, sans-serif"
          font-size="20" font-weight="600" fill="#ffffff">
      ▶ Écouter en streaming
    </text>
  </g>

  <g transform="translate(505,460)">
    <rect width="155" height="56" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="20" y="36" font-family="'Inter', system-ui, sans-serif"
          font-size="20" font-weight="500" fill="rgba(255,255,255,0.8)">
      🇲🇦 100% gratuit
    </text>
  </g>

  <!-- Bottom domain bar -->
  <text x="80" y="585" font-family="'Inter', system-ui, sans-serif"
        font-size="20" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="3">
    RADIO-MAROC · STREAMING HD · SANS INSCRIPTION
  </text>
</svg>
