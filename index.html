<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#E60E1F" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0a14" />
    <meta
      name="description"
      content="Écoutez toutes les radios marocaines en direct gratuitement : Hit Radio, Radio Mars, Chada FM, Medi 1, Radio 2M et plus de 30 stations. Streaming HD, sans inscription."
    />
    <meta name="keywords" content="radio maroc, radio marocaine, radio maroc en direct, écouter radio maroc, radio maroc online, radio fm maroc, hit radio, radio mars, chada fm, medi 1" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <meta name="author" content="Radio Maroc" />
    <meta name="language" content="French" />
    <link rel="canonical" href="https://radiolive.ma/" />
    <link rel="alternate" hreflang="fr-MA" href="https://radiolive.ma/" />
    <link rel="alternate" hreflang="ar-MA" href="https://radiolive.ma/ar" />
    <link rel="alternate" hreflang="x-default" href="https://radiolive.ma/" />
    <meta property="og:url" content="https://radiolive.ma/" />
    <meta property="og:site_name" content="Radio Maroc" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://radiolive.ma/og-default.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />
    <!-- Trim font weights to only the ones the UI actually uses -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="/radios.json" as="fetch" crossorigin />
    <title>Radio Maroc en direct & en ligne — Hit Radio, Mars, MFM, Medi 1</title>

    <!--
      Google AdSense loader.
      Replace ca-pub-XXXXXXXXXXXXXXXX with YOUR publisher ID once your AdSense
      account is approved. The two side banners read it automatically.
      Leave the line as-is in dev — they'll show the "Publicité" placeholder.
    -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
      crossorigin="anonymous"
    ></script>
    <style>
      html, body { margin: 0; height: 100%; background: #07060d; color: #fff;
        font-family: 'Inter', system-ui, sans-serif; }

      /* Pré-rendu du hero — visible dès le parse du HTML (~80 ms), avant
         que le bundle JS soit chargé. Supprimé dès que React monte #root. */
      #pre-hero {
        position: fixed; inset: 0; z-index: 1;
        padding: 5.5rem 1.5rem 0;
        max-width: 80rem; margin: 0 auto;
        pointer-events: none;
        transition: opacity 150ms ease-out;
      }
      #pre-hero h1 {
        font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 700; line-height: 1.15;
        letter-spacing: -0.02em;
        margin: 0; max-width: 64rem;
      }
      #pre-hero .accent {
        background: linear-gradient(90deg, #FF2A3C 0%, #FF6B7A 60%, #FFA07A 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
      }
      #pre-hero.hidden { opacity: 0; }
    </style>
  </head>
  <body class="bg-ink-950 text-white antialiased">
    <div id="root"></div>
    <div id="pre-hero" aria-hidden="true">
      <h1>Radio Maroc en direct, <span class="accent">à portée d'écoute.</span></h1>
    </div>
    <script>
      (function () {
        var root = document.getElementById('root');
        var pre = document.getElementById('pre-hero');
        if (!root || !pre) return;
        var obs = new MutationObserver(function () {
          if (root.children.length > 0) {
            pre.classList.add('hidden');
            obs.disconnect();
            setTimeout(function () {
              if (pre.parentNode) pre.parentNode.removeChild(pre);
            }, 200);
          }
        });
        obs.observe(root, { childList: true });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
